name: Project Docs Check

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  required-files:
    name: Required project-management files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        shell: bash
        run: |
          required_files=(
            "docs/project-management/README.md"
            "docs/project-management/kanban-board.md"
            "docs/project-management/git-flow.md"
            "docs/project-management/branch-strategy.md"
            "docs/project-management/commit-message-rules.md"
            "docs/project-management/pull-request-rules.md"
            "docs/project-management/definition-of-ready.md"
            "docs/project-management/definition-of-done.md"
            ".github/pull_request_template.md"
            ".github/ISSUE_TEMPLATE/feature_request.md"
            ".github/ISSUE_TEMPLATE/bug_report.md"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

          echo "All required project-management files exist."
