name: Deploy Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_VERSION: 0.1.0
  IMAGE_NAME: faithlog-backend

jobs:
  deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_SERVICE_NAME: ${{ vars.GCP_SERVICE_NAME }}
          GCP_ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          required_values=(
            "GCP_PROJECT_ID"
            "GCP_REGION"
            "GCP_SERVICE_NAME"
            "GCP_ARTIFACT_REGISTRY_REPOSITORY"
            "GCP_WORKLOAD_IDENTITY_PROVIDER"
            "GCP_SERVICE_ACCOUNT"
          )

          for name in "${required_values[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required GitHub variable or secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry Docker auth
        shell: bash
        env:
          GCP_REGION: ${{ vars.GCP_REGION }}
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Set image URI
        id: image
        shell: bash
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
        run: |
          image_base="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}"
          echo "uri=${image_base}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "version_uri=${image_base}:v${APP_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.image.outputs.version_uri }}

      - name: Deploy Cloud Run service
        shell: bash
        env:
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_SERVICE_NAME: ${{ vars.GCP_SERVICE_NAME }}
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: |
          gcloud run deploy "${GCP_SERVICE_NAME}" \
            --image "${IMAGE_URI}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --set-env-vars "SPRING_PROFILES_ACTIVE=prod,SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=5,SPRING_FLYWAY_ENABLED=true,SPRING_JPA_HIBERNATE_DDL_AUTO=validate,SPRING_DATA_REDIS_PORT=6379,SPRING_DATA_REDIS_SSL_ENABLED=true,JWT_ACCESS_TOKEN_VALIDITY_SECONDS=1800,JWT_REFRESH_TOKEN_VALIDITY_SECONDS=1209600,SPRINGDOC_API_DOCS_ENABLED=false,SPRINGDOC_SWAGGER_UI_ENABLED=false,FAITHLOG_SCHEDULER_ENABLED=true" \
            --set-secrets "SPRING_DATASOURCE_URL=SPRING_DATASOURCE_URL:latest,SPRING_DATASOURCE_USERNAME=SPRING_DATASOURCE_USERNAME:latest,SPRING_DATASOURCE_PASSWORD=SPRING_DATASOURCE_PASSWORD:latest,SPRING_DATA_REDIS_HOST=SPRING_DATA_REDIS_HOST:latest,SPRING_DATA_REDIS_PASSWORD=SPRING_DATA_REDIS_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,FIREBASE_CONFIG_JSON=FIREBASE_CONFIG_JSON:latest" \
            --quiet

      - name: Verify Cloud Run health
        shell: bash
        env:
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_SERVICE_NAME: ${{ vars.GCP_SERVICE_NAME }}
        run: |
          service_url="$(gcloud run services describe "${GCP_SERVICE_NAME}" --region "${GCP_REGION}" --format='value(status.url)')"
          curl --fail --show-error --silent "${service_url}/api/v1/health"
