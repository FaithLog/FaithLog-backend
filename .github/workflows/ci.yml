name: Backend CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spring-boot:
    name: Spring Boot build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: faithlog_test
          POSTGRES_USER: faithlog
          POSTGRES_PASSWORD: faithlog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U faithlog -d faithlog_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/faithlog_test
      SPRING_DATASOURCE_USERNAME: faithlog
      SPRING_DATASOURCE_PASSWORD: faithlog
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: test-jwt-secret-key-for-ci-only-change-in-production
      JWT_ACCESS_TOKEN_VALIDITY_SECONDS: 3600
      JWT_REFRESH_TOKEN_VALIDITY_SECONDS: 1209600
      FIREBASE_CONFIG_PATH: ''
      FIREBASE_CONFIG_JSON: ''
      SPRINGDOC_API_DOCS_ENABLED: true
      SPRINGDOC_SWAGGER_UI_ENABLED: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Gradle project
        id: gradle
        shell: bash
        run: |
          if [[ -f gradlew && ( -f build.gradle || -f build.gradle.kts ) ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK
        if: steps.gradle.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Validate Gradle wrapper
        if: steps.gradle.outputs.present == 'true'
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        if: steps.gradle.outputs.present == 'true'
        run: chmod +x ./gradlew

      - name: Run tests
        if: steps.gradle.outputs.present == 'true'
        run: ./gradlew test

      - name: Build application
        if: steps.gradle.outputs.present == 'true'
        run: ./gradlew build

      - name: Upload test reports
        if: always() && steps.gradle.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/test
            **/build/test-results/test

      - name: Validate repository bootstrap
        if: steps.gradle.outputs.present != 'true'
        run: |
          test -f .github/pull_request_template.md
          test -f Dockerfile
          test -f docker-compose.yml
          echo "Gradle project is not scaffolded yet. Template and Docker bootstrap files are present."

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: spring-boot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Gradle project
        id: gradle
        shell: bash
        run: |
          if [[ -f gradlew && ( -f build.gradle || -f build.gradle.kts ) ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.gradle.outputs.present == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: faithlog-backend:ci

      - name: Skip Docker build until Spring Boot project exists
        if: steps.gradle.outputs.present != 'true'
        run: echo "Docker build will run after gradlew and build.gradle are added."
