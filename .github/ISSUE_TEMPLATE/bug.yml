name: Bug
description: FaithLog 백엔드 버그 리포트
title: "[Bug] "
labels:
  - bug
body:
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - user
        - campus
        - devotion
        - poll
        - billing
        - notification
        - global
        - infra/docker
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: 어떤 문제가 발생했는지 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: 원래 기대한 동작을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: 실제 동작을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: 관련 로그나 에러 메시지를 붙여주세요.
      render: shell
