name: Feature
description: FaithLog 백엔드 기능 개발 이슈
title: "[Feature] "
labels:
  - feature
body:
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      description: 이 기능이 주로 속하는 도메인을 선택해주세요.
      options:
        - user
        - campus
        - devotion
        - poll
        - billing
        - notification
        - global
        - infra/docker
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: 이 기능이 필요한 이유를 적어주세요.
      placeholder: 예) 캠퍼스 리더가 주간 경건생활 기록을 확인할 수 있어야 한다.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: 구현 범위를 구체적으로 적어주세요.
      placeholder: |
        - API
        - Command/Result
        - Entity/domain method
        - Repository
        - Redis/PostgreSQL 영향
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: 완료 기준을 체크리스트로 적어주세요.
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: 설계 메모, 예외 케이스, 관련 문서를 적어주세요.
