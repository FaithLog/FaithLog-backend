name: Refactor
description: 구조 개선 또는 기술 부채 정리
title: "[Refactor] "
labels:
  - refactor
body:
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - user
        - campus
        - devotion
        - poll
        - billing
        - notification
        - global
        - infra/docker
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current State
      description: 현재 구조나 문제가 되는 지점을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: target
    attributes:
      label: Target State
      description: 개선 후 원하는 구조를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk
      description: 영향 범위와 테스트 포인트를 적어주세요.
