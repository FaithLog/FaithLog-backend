services:
  postgres:
    image: postgres:16-alpine
    container_name: faithlog-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-faithlog}
      POSTGRES_USER: ${POSTGRES_USER:-faithlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faithlog}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-faithlog} -d ${POSTGRES_DB:-faithlog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: faithlog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faithlog-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/faithlog}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-faithlog}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-faithlog}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-local-only}
      FIREBASE_CONFIG_PATH: ${FIREBASE_CONFIG_PATH:-}
      FIREBASE_CONFIG_JSON: ${FIREBASE_CONFIG_JSON:-}
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  redis-data:
