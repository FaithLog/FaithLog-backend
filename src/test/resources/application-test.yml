spring:
  datasource:
    url: jdbc:h2:mem:faithlog-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

faithlog:
  scheduler:
    enabled: false
  jwt:
    secret: test-only-jwt-secret-for-faithlog-auth-tests
    access-token-validity-seconds: 1800
    refresh-token-validity-seconds: 1209600
