spring:
  application:
    name: faithlog-backend
  profiles:
    active: local

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

faithlog:
  api-prefix: /api/v1
  jwt:
    secret: ${JWT_SECRET:change-me-in-local-only}
    access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:1800}
    refresh-token-validity-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}
  firebase:
    config-path: ${FIREBASE_CONFIG_PATH:}
    config-json: ${FIREBASE_CONFIG_JSON:}
  scheduler:
    enabled: ${FAITHLOG_SCHEDULER_ENABLED:true}
    poll-auto-create-delay-ms: ${FAITHLOG_POLL_AUTO_CREATE_DELAY_MS:60000}
    coffee-poll-close-delay-ms: ${FAITHLOG_COFFEE_POLL_CLOSE_DELAY_MS:60000}
    fcm-token-cleanup-cron: ${FAITHLOG_FCM_TOKEN_CLEANUP_CRON:0 20 3 * * *}
